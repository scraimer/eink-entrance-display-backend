<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chore Plan</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }
  a { color: inherit; text-decoration: none; }

  /* ---------- layout ---------- */
  header {
    background: #2c5282; color: #fff;
    padding: 0.75rem 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }
  header h1 { font-size: 1.25rem; font-weight: 700; }
  nav { display: flex; gap: 0; margin-left: auto; }
  nav button {
    background: transparent; border: none; color: #cbd5e0;
    padding: 0.5rem 1rem; cursor: pointer; font-size: 0.95rem;
    border-bottom: 3px solid transparent; transition: color 0.15s;
  }
  nav button:hover { color: #fff; }
  nav button.active { color: #fff; border-bottom-color: #63b3ed; }

  main { max-width: 900px; margin: 1.5rem auto; padding: 0 1rem; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ---------- cards & tables ---------- */
  .card {
    background: #fff; border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    overflow: hidden; margin-bottom: 1.5rem;
  }
  .card-header {
    padding: 0.75rem 1rem; background: #ebf4ff;
    font-weight: 600; display: flex; align-items: center;
    justify-content: space-between;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    background: #f7fafc; padding: 0.6rem 1rem;
    text-align: left; font-size: 0.8rem; text-transform: uppercase;
    letter-spacing: 0.05em; color: #718096;
    border-bottom: 1px solid #e2e8f0;
  }
  td { padding: 0.65rem 1rem; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: #f7fafc; cursor: pointer; }
  tbody tr.expanded { background: #ebf8ff; }

  /* detail / expansion rows */
  .detail-row td {
    background: #f0f9ff; padding: 1rem 1.25rem;
    cursor: default;
  }
  .detail-row:hover td { background: #f0f9ff; }
  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.4rem 2rem; margin-bottom: 0.75rem;
  }
  .detail-grid dt { font-size: 0.78rem; color: #718096; text-transform: uppercase; }
  .detail-grid dd { font-weight: 500; }

  /* ---------- status badges ---------- */
  .badge {
    display: inline-block; padding: 0.15em 0.55em;
    border-radius: 9999px; font-size: 0.75rem; font-weight: 600;
  }
  .badge-green { background: #c6f6d5; color: #276749; }
  .badge-yellow { background: #fefcbf; color: #744210; }
  .badge-red { background: #fed7d7; color: #9b2c2c; }
  .badge-grey { background: #e2e8f0; color: #4a5568; }
  .badge-purple { background: #e9d8fd; color: #553c9a; }
  .badge-black { background: #1a202c; color: #fff; }

  /* ---------- buttons ---------- */
  .btn {
    display: inline-block; padding: 0.4rem 0.85rem;
    border: none; border-radius: 4px; cursor: pointer;
    font-size: 0.875rem; font-weight: 500; transition: opacity 0.15s;
  }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary { background: #3182ce; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #2b6cb0; }
  .btn-success { background: #38a169; color: #fff; }
  .btn-success:hover:not(:disabled) { background: #276749; }
  .btn-danger { background: #e53e3e; color: #fff; }
  .btn-danger:hover:not(:disabled) { background: #c53030; }
  .btn-ghost {
    background: transparent; color: #3182ce;
    border: 1px solid #bee3f8;
  }
  .btn-ghost:hover { background: #ebf8ff; }
  .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.8rem; }

  /* ---------- forms ---------- */
  .form-row { display: flex; gap: 0.6rem; align-items: flex-end; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 0.25rem; }
  label { font-size: 0.8rem; color: #555; font-weight: 500; }
  input[type="text"], input[type="number"], input[type="date"], select {
    padding: 0.4rem 0.6rem; border: 1px solid #cbd5e0;
    border-radius: 4px; font-size: 0.9rem; width: 100%;
    background: #fff;
  }
  input[type="number"] { width: 5rem; }
  .inline-form { padding: 0.75rem 1rem; background: #f7fafc; border-top: 1px solid #e2e8f0; }
  .inline-form .form-row { margin-bottom: 0.5rem; }

  /* ---------- error banner ---------- */
  .error-banner {
    background: #fff5f5; border: 1px solid #feb2b2;
    color: #c53030; border-radius: 4px;
    padding: 0.5rem 0.85rem; margin: 0.5rem 0;
    font-size: 0.875rem; display: none;
  }
  .error-banner.visible { display: block; }
  .success-banner {
    background: #f0fff4; border: 1px solid #9ae6b4;
    color: #276749; border-radius: 4px;
    padding: 0.5rem 0.85rem; margin: 0.5rem 0;
    font-size: 0.875rem; display: none;
  }
  .success-banner.visible { display: block; }

  .bulk-toolbar {
    display: flex;
    align-items: flex-end;
    gap: 0.75rem;
    flex-wrap: wrap;
    padding: 0.75rem 1rem;
    background: #f7fafc;
    border-top: 1px solid #e2e8f0;
    border-bottom: 1px solid #e2e8f0;
  }
  .bulk-count {
    color: #4a5568;
    font-size: 0.82rem;
  }
  .bulk-select-cell {
    width: 2.5rem;
    text-align: center;
  }

  /* ---------- section toggle ---------- */
  .section-toggle { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .section-toggle button {
    padding: 0.4rem 1rem; border: 1px solid #cbd5e0;
    background: #fff; border-radius: 4px; cursor: pointer;
    font-size: 0.875rem;
  }
  .section-toggle button.active { background: #2c5282; color: #fff; border-color: #2c5282; }

  /* ---------- rankings ---------- */
  .rankings-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.5rem; margin-top: 0.5rem;
  }
  .ranking-item { display: flex; align-items: center; gap: 0.5rem; }
  .ranking-item label { flex: 1; font-size: 0.85rem; }
  .ranking-item input { width: 4rem; }

  /* ---------- audit ---------- */
  pre.json-preview {
    background: #1a202c; color: #e2e8f0; padding: 0.75rem 1rem;
    border-radius: 4px; font-size: 0.78rem; overflow-x: auto;
    white-space: pre-wrap; word-break: break-word;
  }
  .op-INSERT { color: #276749; font-weight: 600; }
  .op-UPDATE { color: #744210; font-weight: 600; }
  .op-DELETE { color: #9b2c2c; font-weight: 600; }

  /* ---------- empty state ---------- */
  .empty { padding: 2rem; text-align: center; color: #a0aec0; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>🧹 Chore Plan</h1>
  <nav>
    <button id="tab-btn-chores"    class="active" onclick="switchTab('chores')">Chore Plan</button>
    <button id="tab-btn-management"               onclick="switchTab('management')">Management</button>
    <button id="tab-btn-audit"                    onclick="switchTab('audit')">Audit Log</button>
  </nav>
</header>

<main>
  <!-- ============================================================ TAB 1: CHORES -->
  <div id="tab-chores" class="tab-panel active">
    <div class="card">
      <div class="card-header">
        <span>Chore Plan — <span id="selected-plan-date-label">—</span></span>
        <button class="btn btn-ghost btn-sm" onclick="loadChores()">↻ Refresh</button>
      </div>
      <div class="bulk-toolbar" style="justify-content:flex-start;gap:0.75rem">
        <div class="form-group">
          <label for="chore-plan-date-input">Plan Date</label>
          <input type="date" id="chore-plan-date-input">
        </div>
        <div class="form-group">
          <button class="btn btn-primary btn-sm" onclick="applyChorePlanDate()">Load Plan Date</button>
          <button class="btn btn-ghost btn-sm" onclick="selectTodayPlanDate()" style="margin-top:0.25rem">Today</button>
          <button class="btn btn-ghost btn-sm" onclick="selectTomorrowPlanDate()" style="margin-top:0.25rem">Tomorrow</button>
        </div>
      </div>
      <div id="chores-error" class="error-banner"></div>
      <div id="chores-success" class="success-banner"></div>
      <div id="bulk-refresh-dialog" class="card" style="display:none;margin:0.75rem 1rem;padding:0.75rem;border:1px solid #cbd5e0;box-shadow:none">
        <div id="bulk-refresh-dialog-text" style="margin-bottom:0.5rem;font-size:0.9rem;color:#2d3748"></div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" onclick="handleBulkRefreshChoice('today')">Today</button>
          <button class="btn btn-primary btn-sm" onclick="handleBulkRefreshChoice('tomorrow')">Tomorrow</button>
          <button class="btn btn-ghost btn-sm" onclick="handleBulkRefreshChoice('none')">None</button>
        </div>
      </div>
      <div class="bulk-toolbar">
        <div class="form-group">
          <label for="bulk-next-date">Bulk Next Due Date</label>
          <input type="date" id="bulk-next-date" onchange="updateBulkControls()">
        </div>
        <div class="form-group">
          <button id="bulk-apply-btn" class="btn btn-primary" onclick="applyBulkNextDueDate()" disabled>
            Apply to Selected
          </button>
          <span id="bulk-selection-count" class="bulk-count">0 selected</span>
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <button class="btn btn-ghost" onclick="selectAllVisibleChores()">Select up to 10</button>
          <button class="btn btn-ghost" onclick="clearBulkSelection()" style="margin-top:0.25rem">Clear</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th class="bulk-select-cell">
              <input type="checkbox" id="bulk-select-all" onclick="event.stopPropagation()" onchange="toggleSelectAllFromHeader(this.checked)">
            </th>
            <th>Chore</th>
            <th>Due Date</th>
            <th>Next Executor</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="chores-tbody">
          <tr><td colspan="5" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ============================================================ TAB 2: MANAGEMENT -->
  <div id="tab-management" class="tab-panel">
    <div class="section-toggle">
      <button id="mgmt-btn-people" class="active" onclick="switchMgmtSection('people')">People</button>
      <button id="mgmt-btn-chores"                onclick="switchMgmtSection('chores')">Chores</button>
    </div>

    <!-- People section -->
    <div id="mgmt-people">
      <div class="card">
        <div class="card-header">
          People
          <button class="btn btn-primary btn-sm" onclick="showAddPersonForm()">+ Add Person</button>
        </div>
        <div id="people-error" class="error-banner"></div>
        <table>
          <thead>
            <tr><th>Name</th><th>Ordinal</th><th>Avatar</th><th>In rotation</th><th></th></tr>
          </thead>
          <tbody id="people-tbody">
            <tr><td colspan="5" class="empty">Loading…</td></tr>
          </tbody>
        </table>
        <div id="add-person-form" class="inline-form" style="display:none">
          <div class="form-row">
            <div class="form-group">
              <label>Name</label>
              <input type="text" id="new-person-name" placeholder="Name">
            </div>
            <div class="form-group">
              <label>Ordinal</label>
              <input type="number" id="new-person-ordinal" min="1" placeholder="1">
            </div>
            <div class="form-group">
              <label>Avatar</label>
              <input type="text" id="new-person-avatar" placeholder="avatar.png">
            </div>
            <div class="form-group" style="justify-content:center">
              <label><input type="checkbox" id="new-person-in-rotation" checked> In rotation</label>
            </div>
            <div class="form-group" style="justify-content:flex-end">
              <button class="btn btn-success" onclick="addPerson()">Save</button>
              <button class="btn btn-ghost" onclick="hideAddPersonForm()" style="margin-top:0.25rem">Cancel</button>
            </div>
          </div>
          <div id="add-person-error" class="error-banner"></div>
        </div>
      </div>
    </div>

    <!-- Chores management section -->
    <div id="mgmt-chores" style="display:none">
      <div class="card">
        <div class="card-header">
          Chores
          <button class="btn btn-primary btn-sm" onclick="showAddChoreForm()">+ Add Chore</button>
        </div>
        <div id="mgmt-chores-error" class="error-banner"></div>
        <div class="bulk-toolbar" style="justify-content:space-between;align-items:flex-end">
          <div class="form-row" style="margin:0">
            <div class="form-group">
              <label for="plan-date-input">Selected Plan Date</label>
              <input type="date" id="plan-date-input">
            </div>
            <div class="form-group">
              <button class="btn btn-ghost btn-sm" onclick="selectTodayPlanDate()">Today</button>
              <button class="btn btn-ghost btn-sm" onclick="selectTomorrowPlanDate()" style="margin-top:0.25rem">Tomorrow</button>
            </div>
            <div class="form-group">
              <button class="btn btn-primary btn-sm" onclick="refreshSelectedPlanDate()">Refresh Selected Plan</button>
            </div>
          </div>
          <div id="plan-action-success" class="success-banner" style="margin:0"></div>
        </div>
        <table>
          <thead>
            <tr><th>Name</th><th>Frequency (weeks)</th><th></th></tr>
          </thead>
          <tbody id="mgmt-chores-tbody">
            <tr><td colspan="3" class="empty">Loading…</td></tr>
          </tbody>
        </table>
        <div id="add-chore-form" class="inline-form" style="display:none">
          <div class="form-row">
            <div class="form-group" style="flex:1">
              <label>Name</label>
              <input type="text" id="new-chore-name" placeholder="Chore name">
            </div>
            <div class="form-group">
              <label>Frequency (weeks)</label>
              <input type="number" id="new-chore-freq" min="1" placeholder="1">
            </div>
            <div class="form-group" style="justify-content:center;align-self:flex-end;padding-bottom:0.35rem">
              <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer">
                <input type="checkbox" id="new-chore-same-person"> Same person next time
              </label>
            </div>
            <div class="form-group" style="justify-content:flex-end">
              <button class="btn btn-success" onclick="addChore()">Save</button>
              <button class="btn btn-ghost" onclick="hideAddChoreForm()" style="margin-top:0.25rem">Cancel</button>
            </div>
          </div>
          <div id="add-chore-error" class="error-banner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================ TAB 3: AUDIT LOG -->
  <div id="tab-audit" class="tab-panel">
    <div class="card">
      <div class="card-header">
        Audit Log <span style="font-weight:400;font-size:0.85rem;color:#718096;">(last 100 changes)</span>
        <button class="btn btn-ghost btn-sm" onclick="loadAudit()">↻ Refresh</button>
      </div>
      <div id="audit-error" class="error-banner"></div>
      <table>
        <thead>
          <tr>
            <th>When</th>
            <th>Table</th>
            <th>Operation</th>
            <th>Record ID</th>
            <th>Changed By</th>
          </tr>
        </thead>
        <tbody id="audit-tbody">
          <tr><td colspan="5" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script>
// ============================================================
// State
// ============================================================
let people = [];      // [{id, name, ordinal, avatar, ...}]
let allChores = [];   // from /chores list endpoint
let summary = [];     // from /summary endpoint (chores + state + rankings)
let peopleMap = {};   // id -> {name, ordinal}
let choreStates = {}; // chore_id -> ChoreStateResponse
let selectedChoreIds = new Set();
let selectedPlanDate = getTodayIsoDate();
let pendingBulkRefresh = null;

const BULK_MAX_SELECTION = 10;

const API = '/api/v1/chores';

// ============================================================
// Utilities
// ============================================================
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const json = await res.json().catch(() => null);
  if (!res.ok) {
    const msg = json?.detail || json?.error || res.statusText;
    throw new Error(msg);
  }
  return json;
}

function showError(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.add('visible');
}
function clearError(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = '';
  el.classList.remove('visible');
}
function showSuccess(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.classList.add('visible');
}
function clearSuccess(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = '';
  el.classList.remove('visible');
}

function fmtDate(s) {
  if (!s) return '—';
  // s is YYYY-MM-DD
  return s;
}
function fmtTs(s) {
  if (!s) return '—';
  return s.replace('T', ' ').substring(0, 16);
}

function getDueDayDiff(dateStr) {
  if (!dateStr) return null;
  const due = new Date(dateStr);
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.floor((due - today) / 86400000);
}

function getTodayIsoDate() {
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function getTomorrowIsoDate() {
  const now = new Date();
  now.setDate(now.getDate() + 1);
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function summaryPath() {
  return '/summary?plan_date=' + encodeURIComponent(selectedPlanDate);
}

function updateSelectedPlanDateUI() {
  const label = document.getElementById('selected-plan-date-label');
  if (label) label.textContent = selectedPlanDate || '—';
  const managementInput = document.getElementById('plan-date-input');
  if (managementInput) managementInput.value = selectedPlanDate || '';
  const choresInput = document.getElementById('chore-plan-date-input');
  if (choresInput) choresInput.value = selectedPlanDate || '';
}

function selectTodayPlanDate() {
  selectedPlanDate = getTodayIsoDate();
  updateSelectedPlanDateUI();
  loadChores();
  loadMgmtChores();
}

function selectTomorrowPlanDate() {
  selectedPlanDate = getTomorrowIsoDate();
  updateSelectedPlanDateUI();
  loadChores();
  loadMgmtChores();
}

function applyChorePlanDate() {
  const input = document.getElementById('chore-plan-date-input');
  selectedPlanDate = (input && input.value) ? input.value : getTodayIsoDate();
  updateSelectedPlanDateUI();
  loadChores();
  loadMgmtChores();
}

async function refreshSelectedPlanDate() {
  clearError('mgmt-chores-error');
  clearSuccess('plan-action-success');
  const input = document.getElementById('plan-date-input');
  if (input && input.value) selectedPlanDate = input.value;
  updateSelectedPlanDateUI();
  try {
    await api('POST', '/plans/generate', { plan_date: selectedPlanDate });
    await Promise.all([loadChores(), loadMgmtChores()]);
    showSuccess('plan-action-success', `Plan refreshed for ${selectedPlanDate}`);
  } catch (e) {
    showError('mgmt-chores-error', e.message);
  }
}

function dueBadge(dateStr) {
  if (!dateStr) return '<span class="badge badge-grey">No date</span>';
  const diff = getDueDayDiff(dateStr);
  if (diff === null) return '<span class="badge badge-grey">No date</span>';
  if (diff < 0)  return `<span class="badge badge-red">Overdue ${-diff}d</span>`;
  if (diff === 0) return `<span class="badge badge-yellow">Due today</span>`;
  if (diff <= 1)  return `<span class="badge badge-yellow">In ${diff}d</span>`;
  if (diff <= 7)  return `<span class="badge badge-green">In ${diff}d</span>`;
  return `<span class="badge badge-grey">In ${diff}d</span>`;
}

// ============================================================
// Tab navigation
// ============================================================
const TABS = ['chores', 'management', 'audit'];

function switchTab(name) {
  TABS.forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
    document.getElementById('tab-btn-' + t).classList.toggle('active', t === name);
  });
  // Lazy-load data for each tab
  if (name === 'chores')     loadChores();
  if (name === 'management') loadManagement();
  if (name === 'audit')      loadAudit();
  location.hash = name;
}

function switchMgmtSection(section) {
  ['people', 'chores'].forEach(s => {
    document.getElementById('mgmt-' + s).style.display = s === section ? '' : 'none';
    document.getElementById('mgmt-btn-' + s).classList.toggle('active', s === section);
  });
}

// ============================================================
// TAB 1 — Chores List
// ============================================================
async function loadChores() {
  clearError('chores-error');
  clearSuccess('chores-success');
  const tbody = document.getElementById('chores-tbody');
  tbody.innerHTML = '<tr><td colspan="5" class="empty">Loading…</td></tr>';
  try {
    const [summaryRes, peopleRes] = await Promise.all([
      api('GET', summaryPath()),
      api('GET', '/people'),
    ]);
    people = peopleRes.data || [];
    summary = summaryRes.data?.chores || [];
    peopleMap = Object.fromEntries(people.map(p => [p.id, p]));
    const visibleIds = new Set(summary.map(chore => chore.id));
    selectedChoreIds = new Set([...selectedChoreIds].filter(choreId => visibleIds.has(choreId)));

    const compareByDateAndOrdinal = (a, b) => {
      const da = a.state?.next_execution_date;
      const db = b.state?.next_execution_date;
      if (da && db) {
        if (da !== db) return da < db ? -1 : 1; // ascending
      } else if (da) return -1;
      else if (db) return 1;
      // secondary: ordinal asc
      const oa = peopleMap[a.next_executor_id]?.ordinal ?? Infinity;
      const ob = peopleMap[b.next_executor_id]?.ordinal ?? Infinity;
      return oa - ob;
    };

    if (summary.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">No chores yet. Add some in Management.</td></tr>';
      updateBulkControls();
      return;
    }

    const isDueTodayOrTomorrow = (chore) => {
      const diff = getDueDayDiff(chore.state?.next_execution_date);
      return diff === 0 || diff === 1;
    };
    const dueSoon = summary.filter(isDueTodayOrTomorrow);
    const notDueToday = summary.filter(chore => !isDueTodayOrTomorrow(chore));
    const dueSoonOpen = dueSoon.filter(chore => !chore.is_done).sort(compareByDateAndOrdinal);
    const dueSoonDone = dueSoon.filter(chore => chore.is_done).sort(compareByDateAndOrdinal);
    const firstHalf = [...dueSoonOpen, ...dueSoonDone];
    const secondHalf = notDueToday.sort(compareByDateAndOrdinal);

    let rowIndex = 0;
    const renderRows = (items) => items.map((chore) => {
      const i = rowIndex++;
      const state = chore.state || {};
      const nextPerson = peopleMap[chore.next_executor_id];
      const nextName = nextPerson ? nextPerson.name : '—';
      const samePersonBadge = chore.same_person_next_time
        ? ' <span class="badge badge-purple" title="Same person next time">📌 Always same</span>'
        : '';
      const checked = selectedChoreIds.has(chore.id) ? 'checked' : '';
      const doneBadge = chore.is_done ? '<span class="badge badge-black">Done</span>' : '';
      const unscheduledBadge = chore.next_executor_id ? '' : '<span class="badge badge-grey">Unscheduled</span>';
      return `
        <tr id="chore-row-${i}" onclick="toggleChoreDetail(${i})" data-idx="${i}">
          <td class="bulk-select-cell">
            <input type="checkbox" ${checked}
              onclick="event.stopPropagation()"
              onchange="toggleBulkSelection(${chore.id}, this)">
          </td>
          <td><strong>${esc(chore.name)}</strong>${samePersonBadge}</td>
          <td>${fmtDate(state.next_execution_date)} ${dueBadge(state.next_execution_date)}</td>
          <td>${esc(nextName)}</td>
          <td>${doneBadge}${doneBadge && unscheduledBadge ? ' ' : ''}${unscheduledBadge}</td>
        </tr>
        <tr id="chore-detail-${i}" class="detail-row" style="display:none">
          <td colspan="5">${choreDetailHTML(chore, state)}</td>
        </tr>`;
    }).join('');

    const firstHeader = '<tr><td colspan="5" style="background:#f7fafc;font-weight:600">Due today or tomorrow</td></tr>';
    const secondHeader = '<tr><td colspan="5" style="background:#f7fafc;font-weight:600">Not due today</td></tr>';
    const firstBody = firstHalf.length
      ? renderRows(firstHalf)
      : '<tr><td colspan="5" class="empty">No chores due today or tomorrow.</td></tr>';
    const secondBody = secondHalf.length
      ? renderRows(secondHalf)
      : '<tr><td colspan="5" class="empty">No additional chores.</td></tr>';

    tbody.innerHTML = `${firstHeader}${firstBody}${secondHeader}${secondBody}`;
    updateBulkControls();
  } catch(e) {
    showError('chores-error', e.message);
    tbody.innerHTML = '';
    updateBulkControls();
  }
}

function updateBulkControls() {
  const selectedCount = selectedChoreIds.size;
  const dateValue = document.getElementById('bulk-next-date')?.value;
  const applyBtn = document.getElementById('bulk-apply-btn');
  const count = document.getElementById('bulk-selection-count');
  const selectAll = document.getElementById('bulk-select-all');

  if (count) count.textContent = `${selectedCount} selected`;
  if (applyBtn) {
    applyBtn.disabled = selectedCount === 0 || !dateValue;
    applyBtn.textContent = `Apply to Selected (${selectedCount})`;
  }

  if (selectAll) {
    const visibleCount = summary.length;
    selectAll.checked = visibleCount > 0 && selectedCount > 0 && selectedCount === Math.min(visibleCount, BULK_MAX_SELECTION);
  }
}

function toggleBulkSelection(choreId, checkboxEl) {
  clearError('chores-error');
  clearSuccess('chores-success');

  const checked = !!checkboxEl?.checked;

  if (checked) {
    if (selectedChoreIds.size >= BULK_MAX_SELECTION) {
      if (checkboxEl) checkboxEl.checked = false;
      showError('chores-error', `You can select at most ${BULK_MAX_SELECTION} chores at a time.`);
      return;
    }
    selectedChoreIds.add(choreId);
  } else {
    selectedChoreIds.delete(choreId);
  }

  updateBulkControls();
}

function clearBulkSelection() {
  selectedChoreIds.clear();
  clearError('chores-error');
  clearSuccess('chores-success');
  updateBulkCheckboxes();
  updateBulkControls();
}

function selectAllVisibleChores() {
  clearError('chores-error');
  clearSuccess('chores-success');
  selectedChoreIds.clear();
  for (const chore of summary) {
    if (selectedChoreIds.size >= BULK_MAX_SELECTION) break;
    selectedChoreIds.add(chore.id);
  }
  if (summary.length > BULK_MAX_SELECTION) {
    showError('chores-error', `Only the first ${BULK_MAX_SELECTION} chores were selected.`);
  }
  updateBulkCheckboxes();
  updateBulkControls();
}

function toggleSelectAllFromHeader(checked) {
  if (checked) {
    selectAllVisibleChores();
    return;
  }
  clearBulkSelection();
}

function updateBulkCheckboxes() {
  const checkboxes = document.querySelectorAll('#chores-tbody input[type="checkbox"]');
  checkboxes.forEach(cb => {
    const row = cb.closest('tr');
    const idx = row?.dataset?.idx;
    if (idx === undefined) return;
    const chore = summary[Number(idx)];
    if (!chore) return;
    cb.checked = selectedChoreIds.has(chore.id);
  });
}

async function applyBulkNextDueDate() {
  clearError('chores-error');
  clearSuccess('chores-success');

  const nextExecutionDate = document.getElementById('bulk-next-date').value;
  const choreIds = Array.from(selectedChoreIds);

  if (!nextExecutionDate) {
    showError('chores-error', 'Please select a due date.');
    return;
  }
  if (choreIds.length === 0) {
    showError('chores-error', 'Select at least one chore.');
    return;
  }
  if (choreIds.length > BULK_MAX_SELECTION) {
    showError('chores-error', `You can select at most ${BULK_MAX_SELECTION} chores at a time.`);
    return;
  }

  try {
    const res = await api('PUT', '/executions/bulk-next-due-date', {
      chore_ids: choreIds,
      next_execution_date: nextExecutionDate,
    });
    pendingBulkRefresh = {
      updatedCount: res.data?.updated_count ?? choreIds.length,
      nextExecutionDate,
    };
    selectedChoreIds.clear();
    await loadChores();
    showBulkRefreshDialog();
  } catch(e) {
    showError('chores-error', `Bulk update failed. No chores were updated. ${e.message}`);
  }
}

function showBulkRefreshDialog() {
  const dialog = document.getElementById('bulk-refresh-dialog');
  const text = document.getElementById('bulk-refresh-dialog-text');
  if (!dialog || !text || !pendingBulkRefresh) return;
  text.textContent = `Updated ${pendingBulkRefresh.updatedCount} chores to due date ${pendingBulkRefresh.nextExecutionDate}. Refresh which plan now?`;
  dialog.style.display = '';
}

function hideBulkRefreshDialog() {
  const dialog = document.getElementById('bulk-refresh-dialog');
  if (dialog) dialog.style.display = 'none';
}

async function handleBulkRefreshChoice(choice) {
  clearError('chores-error');
  clearSuccess('chores-success');
  hideBulkRefreshDialog();
  const bulkUpdate = pendingBulkRefresh;
  pendingBulkRefresh = null;
  if (!bulkUpdate) return;

  try {
    if (choice === 'today' || choice === 'tomorrow') {
      await api('POST', '/plans/generate', { plan_date: choice });
      await Promise.all([loadChores(), loadMgmtChores()]);
      showSuccess(
        'chores-success',
        `Updated ${bulkUpdate.updatedCount} chores to due date ${bulkUpdate.nextExecutionDate}. Refreshed ${choice} plan.`
      );
      return;
    }
    showSuccess(
      'chores-success',
      `Updated ${bulkUpdate.updatedCount} chores to due date ${bulkUpdate.nextExecutionDate}.`
    );
  } catch (e) {
    showError('chores-error', e.message);
  }
}

    return `<div class="ranking-item" style="${isNext ? 'font-weight:700' : ''}">
      <label>${esc(person ? person.name : String(score.person_id))}</label>

      <dt>Next Date</dt><dd>${fmtDate(state.next_execution_date)}</dd>

    </dl>

    <div id="done-error-${chore.id}" class="error-banner"></div>
    <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap">
      <button class="btn btn-success btn-sm"
        ${canMarkDone ? '' : 'disabled title="No next executor scheduled"'}
        onclick="markDone(${chore.id}, ${chore.next_executor_id})">
        ✓ Mark as Done
      </button>
      ${canMarkDone ? `<a href="#" id="done-by-other-link-${chore.id}"
        style="font-size:0.8rem;color:#718096"

        <a href="#" style="font-size:0.8rem;color:#718096"
          onclick="event.preventDefault();hideDoneByOther(${chore.id})">Cancel</a>
      </div>
    </div>` : ''}`;
}

async function savePerson(id) {

async function toggleRankings(personId) {
  const row = document.getElementById('person-rankings-' + personId);
  const isHidden = row.style.display === 'none';
  row.style.display = isHidden ? '' : 'none';
  if (isHidden) await loadRankingsForPerson(personId);
}

async function loadRankingsForPerson(personId) {
  clearError('rankings-error-' + personId);
  const grid = document.getElementById('rankings-grid-' + personId);
  try {
    const [rankRes, choreRes] = await Promise.all([
      api('GET', '/rankings?person_id=' + personId),
      allChores.length ? Promise.resolve({ data: allChores }) : api('GET', '/chores'),
    ]);
    allChores = choreRes.data || [];
    const ratings = Object.fromEntries((rankRes.data || []).map(r => [r.chore_id, r.rating]));
    const rankableChores = allChores.filter(c => !c.same_person_next_time);
    if (rankableChores.length === 0) {
      grid.innerHTML = '<em>No chores to rank.</em>';
      return;
    }
    grid.innerHTML = rankableChores.map(c => `
      <div class="ranking-item">
        <label for="rank-${personId}-${c.id}">${esc(c.name)}</label>
        <input type="number" id="rank-${personId}-${c.id}"
          min="1" max="10" placeholder="—"
          value="${ratings[c.id] !== undefined ? ratings[c.id] : ''}">
      </div>`).join('');
  } catch(e) {
    showError('rankings-error-' + personId, e.message);
    grid.innerHTML = '';
  }
}

async function saveRankings(personId) {
  clearError('rankings-error-' + personId);
  const errors = [];
  for (const chore of allChores.filter(c => !c.same_person_next_time)) {
    const input = document.getElementById(`rank-${personId}-${chore.id}`);
    if (!input) continue;
    const val = input.value.trim();
    if (val === '') continue;
    const rating = parseInt(val);
    if (isNaN(rating) || rating < 1 || rating > 10) {
      errors.push(`Rating for "${chore.name}" must be 1–10.`);
      continue;
    }
    try {
      await api('POST', '/rankings', { person_id: personId, chore_id: chore.id, rating });
    } catch(e) {
      errors.push(`"${chore.name}": ${e.message}`);
    }
  }
  if (errors.length) showError('rankings-error-' + personId, errors.join(' | '));
}

          </div>
        </div>
        <div id="edit-chore-error-${c.id}" class="error-banner"></div>
      </td>
    </tr>
    <tr id="chore-sched-edit-${c.id}" style="display:none">
      <td colspan="3" class="inline-form">
        <strong style="font-size:0.85rem;display:block;margin-bottom:0.5rem">Edit Next Execution</strong>
        <div class="form-row">
          <div class="form-group">
            <label>Next Due Date</label>
            <input type="date" id="sched-date-${c.id}">
          </div>
          <div class="form-group" style="flex:1">
            <label>Next Executor</label>
            <select id="sched-executor-${c.id}"></select>
          </div>
          <div class="form-group" style="justify-content:flex-end">
            <button class="btn btn-success btn-sm" onclick="saveSchedule(${c.id})">Save</button>
            <button class="btn btn-ghost btn-sm" onclick="hideEditSchedule(${c.id})" style="margin-top:0.25rem">Cancel</button>
          </div>
        </div>
        <div id="sched-error-${c.id}" class="error-banner"></div>
      </td>
    </tr>`;
}

function showEditChore(id) {
  hideEditSchedule(id);
  document.getElementById('chore-mgmt-edit-' + id).style.display = '';
}
function hideEditChore(id) {
  document.getElementById('chore-mgmt-edit-' + id).style.display = 'none';
  clearError('edit-chore-error-' + id);
}

function showEditSchedule(choreId) {
  hideEditChore(choreId);
  const state = choreStates[choreId] || {};
  // Pre-populate date
  document.getElementById('sched-date-' + choreId).value = state.next_execution_date || '';
  // Populate people dropdown
  const sel = document.getElementById('sched-executor-' + choreId);
  sel.innerHTML = '<option value="">— None —</option>' +
    people.map(p =>
      `<option value="${p.id}" ${p.id === state.fixed_executor_id ? 'selected' : ''}>${esc(p.name)}</option>`
    ).join('');
  clearError('sched-error-' + choreId);
  document.getElementById('chore-sched-edit-' + choreId).style.display = '';
}
function hideEditSchedule(id) {
  const el = document.getElementById('chore-sched-edit-' + id);
  if (el) el.style.display = 'none';
  clearError('sched-error-' + id);
}

async function saveSchedule(choreId) {
  clearError('sched-error-' + choreId);
  const date = document.getElementById('sched-date-' + choreId).value;
  const executorVal = document.getElementById('sched-executor-' + choreId).value;
  const fixed_executor_id = executorVal ? parseInt(executorVal) : null;
  if (!date && !fixed_executor_id) {
    showError('sched-error-' + choreId, 'Please provide a date or select an executor.');
    return;
  }
  try {
    await api('PUT', '/executions/next-executor', {
      chore_id: choreId,
      fixed_executor_id: fixed_executor_id,
      next_execution_date: date || null,
    });
    hideEditSchedule(choreId);
    await loadMgmtChores();
  } catch(e) {
    showError('sched-error-' + choreId, e.message);
  }
}

async function saveChore(id) {
  clearError('edit-chore-error-' + id);
  const name = document.getElementById('edit-chore-name-' + id).value.trim();
  const freq = parseInt(document.getElementById('edit-chore-freq-' + id).value);
  const samePersonNextTime = document.getElementById('edit-chore-same-person-' + id).checked;
  if (!name || isNaN(freq) || freq < 1) {
    showError('edit-chore-error-' + id, 'Name is required and frequency must be ≥ 1.');
    return;
  }
  try {
    await api('PUT', '/chores/' + id, { name, frequency_in_weeks: freq, same_person_next_time: samePersonNextTime });
    await loadMgmtChores();
  } catch(e) {
    showError('edit-chore-error-' + id, e.message);
  }
}

async function deleteChore(id, name) {
  if (!confirm(`Delete chore "${name}"? This will also remove its state, executions, and rankings.`)) return;
  clearError('mgmt-chores-error');
  try {
    await api('DELETE', '/chores/' + id);
    await loadMgmtChores();
  } catch(e) {
    showError('mgmt-chores-error', e.message);
  }
}

function showAddChoreForm() {
  document.getElementById('add-chore-form').style.display = '';
  clearError('add-chore-error');
}
function hideAddChoreForm() {
  document.getElementById('add-chore-form').style.display = 'none';
}

async function addChore() {
  clearError('add-chore-error');
  const name = document.getElementById('new-chore-name').value.trim();
  const freq = parseInt(document.getElementById('new-chore-freq').value);
  const samePersonNextTime = document.getElementById('new-chore-same-person').checked;
  if (!name || isNaN(freq) || freq < 1) {
    showError('add-chore-error', 'Name is required and frequency must be ≥ 1.');
    return;
  }
  try {
    await api('POST', '/chores', { name, frequency_in_weeks: freq, same_person_next_time: samePersonNextTime });
    document.getElementById('new-chore-name').value = '';
    document.getElementById('new-chore-freq').value = '';
    document.getElementById('new-chore-same-person').checked = false;
    hideAddChoreForm();
    await loadMgmtChores();
  } catch(e) {
    showError('add-chore-error', e.message);
  }
}

// ============================================================
// TAB 3 — Audit Log
// ============================================================
async function loadAudit() {
  clearError('audit-error');
  const tbody = document.getElementById('audit-tbody');
  tbody.innerHTML = '<tr><td colspan="5" class="empty">Loading…</td></tr>';
  try {
    const res = await api('GET', '/audit');
    const entries = (res.data || []).slice(0, 100);
    if (entries.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">No audit entries yet.</td></tr>';
      return;
    }
    tbody.innerHTML = entries.map((e, i) => auditRowHTML(e, i)).join('');
  } catch(err) {
    showError('audit-error', err.message);
    tbody.innerHTML = '';
  }
}

function auditRowHTML(e, i) {
  const opClass = 'op-' + e.operation;
  const hasDiff = e.before_values || e.after_values;
  return `
    <tr ${hasDiff ? `onclick="toggleAuditDetail(${i})" style="cursor:pointer"` : ''}>
      <td>${fmtTs(e.changed_at)}</td>
      <td>${esc(e.table_name)}</td>
      <td><span class="${opClass}">${esc(e.operation)}</span></td>
      <td>${e.record_id}</td>
      <td>${esc(e.changed_by || '—')}</td>
    </tr>
    ${hasDiff ? `
    <tr id="audit-detail-${i}" class="detail-row" style="display:none">
      <td colspan="5">
        ${e.before_values ? `<p style="margin-bottom:0.3rem;font-size:0.8rem;color:#718096">Before</p><pre class="json-preview">${fmtJson(e.before_values)}</pre>` : ''}
        ${e.after_values  ? `<p style="margin:0.5rem 0 0.3rem;font-size:0.8rem;color:#718096">After</p><pre class="json-preview">${fmtJson(e.after_values)}</pre>` : ''}
      </td>
    </tr>` : ''}`;
}

function toggleAuditDetail(i) {
  const row = document.getElementById('audit-detail-' + i);
  if (row) row.style.display = row.style.display === 'none' ? '' : 'none';
}

function fmtJson(s) {
  try { return esc(JSON.stringify(JSON.parse(s), null, 2)); }
  catch { return esc(s); }
}

// ============================================================
// Escape helper (XSS prevention)
// ============================================================
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ============================================================
// Bootstrap
// ============================================================
(function init() {
  updateSelectedPlanDateUI();
  const planDateInput = document.getElementById('plan-date-input');
  if (planDateInput) {
    planDateInput.value = selectedPlanDate;
    planDateInput.addEventListener('change', () => {
      selectedPlanDate = planDateInput.value || getTodayIsoDate();
      updateSelectedPlanDateUI();
      loadChores();
      loadMgmtChores();
    });
  }
  const choresPlanDateInput = document.getElementById('chore-plan-date-input');
  if (choresPlanDateInput) {
    choresPlanDateInput.value = selectedPlanDate;
    choresPlanDateInput.addEventListener('change', () => {
      selectedPlanDate = choresPlanDateInput.value || getTodayIsoDate();
      updateSelectedPlanDateUI();
    });
  }

  const hash = location.hash.replace('#', '') || 'chores';
  const validTab = ['chores', 'management', 'audit'].includes(hash) ? hash : 'chores';
  switchTab(validTab);

  window.addEventListener('hashchange', () => {
    const h = location.hash.replace('#', '');
    if (['chores', 'management', 'audit'].includes(h)) {
      switchTab(h);
    }
  });
})();
</script>
