version: '3'

vars:
  PROD_PORT: 8321
  DEV_PORT: 8323
  DEBUG_IMAGE: eink-entrance-display-backend-debug:latest
  PROD_CONTAINER_NAME: eink_backend_prod

tasks:
  build_base_docker_container:
    internal: true
    cmds:
      - docker build --tag eink-entrance-display-backend-base:latest deploy/docker-containers/base

  daemon_run:
    desc: Run the application so it restarts on reboot
    cmds:
      - docker run -d --name {{.PROD_CONTAINER_NAME}} --restart unless-stopped --publish {{.PROD_PORT}}:{{.PROD_PORT}} {{.DEBUG_IMAGE}}

  docker_build:
    desc: Build the docker, while preserving intermediate layers
    cmds:
      - task: build_base_docker_container
      - docker build --tag {{.DEBUG_IMAGE}} --rm=false deploy/docker-containers/debug

  docker_run:
    desc: Run the docker, interactive for debugging (press CTRL-C to exit)
    cmds:
      - docker run -it --name {{.PROD_CONTAINER_NAME}} --publish {{.PROD_PORT}}:{{.PROD_PORT}} --mount type=bind,source="$(pwd)",target=/app {{.DEBUG_IMAGE}}

  docker_stop:
    desc: Stop the prod docker container
    cmds:
      - docker stop {{.PROD_CONTAINER_NAME}}
      - docker container rm {{.PROD_CONTAINER_NAME}}

  dev_debug_run:
    desc: (inside devcontainer only) Run the server outside the server, for debugging 
    cmds:
      - /usr/local/bin/uvicorn src.eink_backend.main:app --reload --host 0.0.0.0 --port {{.DEV_PORT}}

  dev_run_tests:
    desc: (inside devcontainer only) Build debug docker and run the tests
    cmds:
      - bash -c "cd /app; pytest"


  default:
    cmds:
      - task --list
